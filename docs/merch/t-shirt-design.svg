<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E55A2B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (represents print area on dark tee) -->
  <rect width="2400" height="3200" fill="url(#bgGrad)" rx="20"/>

  <!-- Subtle circuit-board pattern background -->
  <g opacity="0.06" stroke="#FF6B35" stroke-width="1.5" fill="none">
    <line x1="200" y1="0" x2="200" y2="3200"/>
    <line x1="600" y1="0" x2="600" y2="3200"/>
    <line x1="1000" y1="0" x2="1000" y2="3200"/>
    <line x1="1400" y1="0" x2="1400" y2="3200"/>
    <line x1="1800" y1="0" x2="1800" y2="3200"/>
    <line x1="2200" y1="0" x2="2200" y2="3200"/>
    <line x1="0" y1="400" x2="2400" y2="400"/>
    <line x1="0" y1="800" x2="2400" y2="800"/>
    <line x1="0" y1="1200" x2="2400" y2="1200"/>
    <line x1="0" y1="1600" x2="2400" y2="1600"/>
    <line x1="0" y1="2000" x2="2400" y2="2000"/>
    <line x1="0" y1="2400" x2="2400" y2="2400"/>
    <line x1="0" y1="2800" x2="2400" y2="2800"/>
    <!-- Circuit nodes -->
    <circle cx="600" cy="800" r="6"/>
    <circle cx="1400" cy="1200" r="6"/>
    <circle cx="1000" cy="2000" r="6"/>
    <circle cx="1800" cy="2400" r="6"/>
    <circle cx="200" cy="1600" r="6"/>
    <circle cx="2200" cy="2800" r="6"/>
  </g>

  <!-- Crab Icon - Stylized Ferris the Rust Crab -->
  <g transform="translate(1200, 1100)" filter="url(#glow)">
    <!-- Crab body -->
    <ellipse cx="0" cy="0" rx="280" ry="200" fill="url(#rustOrange)"/>
    <!-- Crab body shine -->
    <ellipse cx="-40" cy="-50" rx="160" ry="90" fill="#FF8C57" opacity="0.4"/>

    <!-- Left claw -->
    <g transform="translate(-320, -80)">
      <path d="M0,0 C-60,-80 -140,-100 -180,-60 C-200,-40 -180,10 -140,30 L-60,0 Z" fill="url(#rustOrange)" stroke="#E55A2B" stroke-width="3"/>
      <path d="M-60,0 C-80,-40 -130,-50 -150,-30 C-160,-20 -150,5 -130,15 Z" fill="#FF8C57" opacity="0.5"/>
    </g>

    <!-- Right claw -->
    <g transform="translate(320, -80)">
      <path d="M0,0 C60,-80 140,-100 180,-60 C200,-40 180,10 140,30 L60,0 Z" fill="url(#rustOrange)" stroke="#E55A2B" stroke-width="3"/>
      <path d="M60,0 C80,-40 130,-50 150,-30 C160,-20 150,5 130,15 Z" fill="#FF8C57" opacity="0.5"/>
    </g>

    <!-- Left legs -->
    <line x1="-240" y1="40" x2="-360" y2="120" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>
    <line x1="-220" y1="100" x2="-340" y2="200" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>
    <line x1="-200" y1="150" x2="-300" y2="270" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>

    <!-- Right legs -->
    <line x1="240" y1="40" x2="360" y2="120" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>
    <line x1="220" y1="100" x2="340" y2="200" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>
    <line x1="200" y1="150" x2="300" y2="270" stroke="#E55A2B" stroke-width="14" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="-90" cy="-100" r="40" fill="#ffffff"/>
    <circle cx="90" cy="-100" r="40" fill="#ffffff"/>
    <circle cx="-90" cy="-100" r="22" fill="#1a1a2e"/>
    <circle cx="90" cy="-100" r="22" fill="#1a1a2e"/>
    <circle cx="-82" cy="-108" r="8" fill="#ffffff"/>
    <circle cx="98" cy="-108" r="8" fill="#ffffff"/>

    <!-- Antennae -->
    <path d="M-60,-190 C-80,-280 -40,-320 -20,-300" stroke="#E55A2B" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M60,-190 C80,-280 40,-320 20,-300" stroke="#E55A2B" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="-300" r="10" fill="#FFD700"/>
    <circle cx="20" cy="-300" r="10" fill="#FFD700"/>

    <!-- Blockchain chain overlay on crab body -->
    <g opacity="0.25">
      <rect x="-80" y="-30" width="50" height="30" rx="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
      <rect x="-20" y="-30" width="50" height="30" rx="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
      <rect x="40" y="-30" width="50" height="30" rx="6" fill="none" stroke="#FFD700" stroke-width="2.5"/>
    </g>
  </g>

  <!-- Chain Links Decorative Band -->
  <g transform="translate(1200, 1520)" filter="url(#softGlow)">
    <g fill="none" stroke="url(#chainGold)" stroke-width="5">
      <rect x="-500" y="-20" width="80" height="40" rx="12"/>
      <rect x="-400" y="-20" width="80" height="40" rx="12"/>
      <rect x="-300" y="-20" width="80" height="40" rx="12"/>
      <rect x="-200" y="-20" width="80" height="40" rx="12"/>
      <rect x="-100" y="-20" width="80" height="40" rx="12"/>
      <rect x="0" y="-20" width="80" height="40" rx="12"/>
      <rect x="100" y="-20" width="80" height="40" rx="12"/>
      <rect x="200" y="-20" width="80" height="40" rx="12"/>
      <rect x="300" y="-20" width="80" height="40" rx="12"/>
      <rect x="400" y="-20" width="80" height="40" rx="12"/>
    </g>
  </g>

  <!-- RUSTCHAIN wordmark -->
  <text x="1200" y="1750" text-anchor="middle" font-family="'Courier New', 'Fira Code', monospace" font-size="180" font-weight="bold" letter-spacing="18" filter="url(#glow)">
    <tspan fill="url(#rustOrange)">RUST</tspan><tspan fill="url(#chainGold)">CHAIN</tspan>
  </text>

  <!-- Horizontal rule -->
  <line x1="600" y1="1820" x2="1800" y2="1820" stroke="#FFD700" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text x="1200" y="1920" text-anchor="middle" font-family="'Courier New', 'Fira Code', monospace" font-size="56" fill="#c0c0c0" letter-spacing="14" opacity="0.85">
    PROOF OF ANTIQUITY
  </text>

  <!-- Block hash decoration -->
  <text x="1200" y="2060" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#FF6B35" opacity="0.35" letter-spacing="2">
    0xRCH41N::7F3A::B10C::K5E7::D4T4::PR00F
  </text>

  <!-- Bottom accent line -->
  <line x1="800" y1="2120" x2="1600" y2="2120" stroke="#FF6B35" stroke-width="1.5" opacity="0.3"/>
</svg>
